name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Prepare dist folder (copy web assets)
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r src/* dist/ 2>/dev/null || true

      - name: Check if Android project exists
        id: check_android
        run: |
          if [ -d android/app/src/main ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Android project
        if: steps.check_android.outputs.exists == 'false'
        run: npx cap add android

      - name: Sync Capacitor (updates web assets, keeps icons)
        if: steps.check_android.outputs.exists == 'true'
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocPilot-Knipexilino-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
